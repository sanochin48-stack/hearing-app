<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1D9E75">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="247">
<title>247 ヒアリング</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f5f4f0; min-height: 100vh; }
#header { position: fixed; top: 0; left: 0; right: 0; background: #fff; border-bottom: 1px solid #e8e5e0; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; z-index: 100; }
#header-title { font-size: 15px; font-weight: 600; color: #1D9E75; }
#update-btn { font-size: 12px; color: #888; background: #f0ede8; border: none; border-radius: 8px; padding: 5px 12px; cursor: pointer; font-family: inherit; }
#update-status { font-size: 11px; color: #1D9E75; display: none; }
#app { max-width: 480px; margin: 0 auto; padding: 4.5rem 1rem 3rem; display: flex; flex-direction: column; gap: 12px; }
.bubble { max-width: 88%; padding: 13px 17px; font-size: 15px; line-height: 1.7; animation: fadeIn 0.35s ease; white-space: pre-wrap; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.bubble.ai { background: #fff; color: #1a1a1a; border-radius: 4px 18px 18px 18px; align-self: flex-start; box-shadow: 0 1px 4px rgba(0,0,0,0.09); max-width: 92%; }
.bubble.user { background: #1D9E75; color: #fff; border-radius: 18px 18px 4px 18px; align-self: flex-end; }
.choices { display: flex; flex-direction: column; gap: 9px; width: 92%; }
.choice-btn { background: #fff; border: 1px solid #e0ddd6; border-radius: 13px; padding: 12px 17px; font-size: 15px; color: #1a1a1a; cursor: pointer; text-align: left; line-height: 1.5; font-family: inherit; transition: border-color 0.15s, background 0.15s; }
.choice-btn:hover, .choice-btn:active { background: #f0faf6; border-color: #1D9E75; }
.proposal-card { background: #fff; border: 2px solid #1D9E75; border-radius: 16px; padding: 1.4rem; width: 92%; animation: fadeIn 0.4s ease; }
.proposal-label { font-size: 11px; font-weight: 600; color: #1D9E75; letter-spacing: 0.1em; margin-bottom: 8px; }
.proposal-name { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
.proposal-copy { font-size: 14px; color: #555; margin-bottom: 14px; line-height: 1.6; }
.proposal-reason { background: #f5fdf9; border-radius: 10px; padding: 12px 14px; font-size: 14px; color: #1a1a1a; line-height: 1.7; }
.proposal-reason-label { font-size: 11px; color: #1D9E75; font-weight: 600; margin-bottom: 4px; }
.measure-btn { background: #1D9E75; color: #fff; border: none; border-radius: 13px; padding: 15px 20px; font-size: 16px; font-weight: 600; cursor: pointer; width: 92%; font-family: inherit; margin-top: 4px; animation: fadeIn 0.4s ease; }
.measure-btn:active { opacity: 0.85; }
.summary-card { background: #fff; border: 1px solid #e0ddd6; border-radius: 14px; padding: 1.25rem; width: 92%; animation: fadeIn 0.4s ease; }
.summary-card h3 { font-size: 11px; font-weight: 600; color: #999; margin-bottom: 10px; letter-spacing: 0.08em; }
.summary-item { font-size: 14px; color: #1a1a1a; padding: 7px 0; border-bottom: 1px solid #f0ede8; }
.summary-item:last-child { border-bottom: none; }
.summary-label { font-size: 11px; color: #888; margin-bottom: 2px; }
.summary-value { font-weight: 500; }
#restart-btn { margin-top: 1rem; background: transparent; border: 1px solid #d0cdc6; border-radius: 10px; padding: 10px 20px; font-size: 14px; color: #666; cursor: pointer; font-family: inherit; display: block; width: 100%; }
.dot-row { display: flex; gap: 5px; padding: 14px 18px; background: #fff; border-radius: 4px 18px 18px 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.09); width: fit-content; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #bbb; animation: bounce 1.1s infinite; }
.dot:nth-child(2) { animation-delay: 0.18s; }
.dot:nth-child(3) { animation-delay: 0.36s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
</style>
</head>
<body>
<div id="header">
  <span id="header-title">247 ヒアリング</span>
  <div style="display:flex;align-items:center;gap:8px;">
    <span id="update-status">更新しました</span>
    <button id="update-btn" onclick="updateContent()">更新</button>
  </div>
</div>
<div id="app"></div>
<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

let config = {
  product: { name: '247', copy: 'つけているだけで血流をサポート' },
  flow: [
    { id:'greeting', message:'こんにちは！\n少しだけ教えていただけますか？\n最近、体の調子はいかがですか？', key:'condition', choices:[{label:'良い',next:'good_condition'},{label:'まあまあ',next:'ask_symptom'},{label:'あまり良くない',next:'ask_symptom'}] },
    { id:'good_condition', message:'それは良かったです！\n体調が良くても、気になることはありますか？', key:'symptom', choices:[{label:'手足の冷えが気になる',next:'ask_duration'},{label:'疲れが取れにくい',next:'ask_duration'},{label:'肩こり・首こりがある',next:'ask_duration'},{label:'特に気になることはない',next:'ask_lifestyle'}] },
    { id:'ask_symptom', message:'そうなんですね。\n特に気になっていることはありますか？', key:'symptom', choices:[{label:'手足の冷えが気になる',next:'ask_duration'},{label:'疲れが取れにくい',next:'ask_duration'},{label:'肩こり・首こりがある',next:'ask_duration'},{label:'頭が重い・頭痛がある',next:'ask_duration'}] },
    { id:'ask_duration', message:'それはいつ頃からですか？', key:'duration', choices:[{label:'最近になってから',next:'ask_lifestyle'},{label:'半年以上前から',next:'ask_lifestyle'},{label:'ずっと前から',next:'ask_lifestyle'}] },
    { id:'ask_lifestyle', message:'生活習慣で、心当たりはありますか？', key:'lifestyle', choices:[{label:'睡眠が不規則・不足しがち',next:'ask_effort'},{label:'運動する機会が少ない',next:'ask_effort'},{label:'食事が不規則になりがち',next:'ask_effort'},{label:'ストレスが多い',next:'ask_effort'}] },
    { id:'ask_effort', message:'今まで、自分で何か試してみたことはありますか？', key:'effort', choices:[{label:'サプリメントを飲んでいる・飲んでいた',next:'ask_result'},{label:'運動を始めようとしたことがある',next:'ask_result'},{label:'食事を気をつけようとしたことがある',next:'ask_result'},{label:'特に何もしていない',next:'proposal'}] },
    { id:'ask_result', message:'そうなんですね。\nやってみて、実感としてはいかがでしたか？', key:'result', choices:[{label:'効果はあったけど、続かなかった',next:'proposal'},{label:'あまり変わらなかった',next:'proposal'},{label:'やったりやめたりしてしまった',next:'proposal'}] },
    { id:'proposal', isProposal:true }
  ]
};

async function updateContent() {
  const btn = document.getElementById('update-btn');
  const status = document.getElementById('update-status');
  btn.textContent = '取得中…'; btn.disabled = true;
  try {
    const res = await fetch('config.json?t=' + Date.now());
    if (!res.ok) throw new Error();
    config = await res.json();
    status.style.display = 'inline';
    setTimeout(() => status.style.display = 'none', 2000);
  } catch(e) {
    alert('更新できませんでした。\nWi-Fi接続を確認してください。');
  } finally {
    btn.textContent = '更新'; btn.disabled = false;
  }
}

const app = document.getElementById('app');
const answers = {};
const getFlowMap = () => { const m={}; config.flow.forEach(f=>m[f.id]=f); return m; };

function addBubble(text, type) {
  return new Promise(r => setTimeout(() => {
    const b = document.createElement('div'); b.className='bubble '+type; b.textContent=text;
    app.appendChild(b); scroll(); r();
  }, 0));
}

function showTyping(ms=650) {
  return new Promise(r => {
    const d=document.createElement('div'); d.className='dot-row'; d.id='typing';
    d.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    app.appendChild(d); scroll(); setTimeout(()=>{d.remove();r();},ms);
  });
}

function scroll() { window.scrollTo(0, document.body.scrollHeight); }

function buildReason() {
  const name = config.product?.name||'247';
  const parts=[];
  if(answers.symptom) parts.push(`「${answers.symptom}」というお悩み`);
  if(answers.duration) parts.push(`${answers.duration}続いている状態`);
  if(answers.lifestyle) parts.push(`${answers.lifestyle}という生活習慣`);
  if(answers.result) parts.push(`自分で試しても${answers.result}という経験`);
  if(answers.effort==='特に何もしていない') parts.push('まだ何も試していない状態');
  if(!parts.length) return `今の体の状態を考えると、${name}がお役に立てると思います。`;
  return parts.join('、')+`に対して、${name}はつけているだけで血流をサポートできるので、生活を変えずに続けられます。`;
}

function buildOpeningLine() {
  const s=answers.symptom||'体の不調';
  const r=answers.result||(answers.effort==='特に何もしていない'?'まだ何も試していない':null);
  if(r) return `「${s}が気になっていて、${r}んですね。血流が関係していることが多いので、今から一緒に確認してみましょう」`;
  return `「${s}が気になっているとのことで、血流が関係していることが多いので、今から一緒に確認してみましょう」`;
}

async function showProposal() {
  const p=config.product||{name:'247',copy:'つけているだけで血流をサポート'};
  await showTyping(800);
  await addBubble('ありがとうございます。\nお話を聞かせていただいて、ぴったりのものがあります。','ai');
  await showTyping(600);
  const card=document.createElement('div'); card.className='proposal-card';
  card.innerHTML=`<div class="proposal-label">あなたへのご提案</div><div class="proposal-name">${p.name}</div><div class="proposal-copy">${p.copy}</div><div class="proposal-reason"><div class="proposal-reason-label">なぜあなたに合っているか</div>${buildReason()}</div>`;
  app.appendChild(card); scroll();
  await showTyping(700);
  await addBubble('実際に体でどう変わるか、\n確認してみませんか？\n測定すると、今の血流の状態がご自身の目で確認できます。','ai');
  setTimeout(()=>{
    const btn=document.createElement('button'); btn.className='measure-btn'; btn.textContent='確認のために測定してみる';
    btn.onclick=()=>{btn.remove();showHandover();}; app.appendChild(btn); scroll();
  },400);
}

async function showHandover() {
  await addBubble('確認してみます','user');
  await showTyping(600);
  await addBubble('ありがとうございます！\nでは担当者をお呼びします。\nそのままお待ちください。','ai');
  setTimeout(()=>{
    const labels={condition:'体調',symptom:'気になる症状',duration:'いつから',lifestyle:'生活習慣',effort:'自力での取り組み',result:'取り組みの結果'};
    const card=document.createElement('div'); card.className='summary-card';
    card.innerHTML='<h3>販売員へのサマリー</h3>';
    Object.keys(labels).forEach(key=>{
      if(answers[key]){const item=document.createElement('div');item.className='summary-item';item.innerHTML=`<div class="summary-label">${labels[key]}</div><div class="summary-value">${answers[key]}</div>`;card.appendChild(item);}
    });
    const sc=document.createElement('div');
    sc.style.cssText='margin-top:12px;background:#fff8f0;border-radius:10px;padding:12px 14px;font-size:14px;line-height:1.7;color:#1a1a1a;';
    sc.innerHTML=`<div style="font-size:11px;color:#e07020;font-weight:600;margin-bottom:4px;">最初のひと言</div>${buildOpeningLine()}`;
    card.appendChild(sc);
    const btn=document.createElement('button');btn.id='restart-btn';btn.textContent='最初からやり直す';btn.onclick=restart;card.appendChild(btn);
    app.appendChild(card);scroll();
  },400);
}

function addChoices(step) {
  const div=document.createElement('div'); div.className='choices';
  step.choices.forEach(c=>{
    const btn=document.createElement('button'); btn.className='choice-btn'; btn.textContent=c.label;
    btn.onclick=async()=>{div.remove();if(step.key)answers[step.key]=c.label;await addBubble(c.label,'user');await goTo(c.next);};
    div.appendChild(btn);
  });
  app.appendChild(div); scroll();
}

async function goTo(id) {
  const step=getFlowMap()[id]; if(!step)return;
  if(step.isProposal){await showProposal();return;}
  await showTyping(600); await addBubble(step.message,'ai'); addChoices(step);
}

function restart() { Object.keys(answers).forEach(k=>delete answers[k]); app.innerHTML=''; init(); }

async function init() {
  const first=getFlowMap()['greeting'];
  await showTyping(500); await addBubble(first.message,'ai'); addChoices(first);
}

init();
</script>
</body>
</html>
