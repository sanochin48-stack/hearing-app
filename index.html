<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ヒアリング</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f5f4f0; min-height: 100vh; }
#app { max-width: 480px; margin: 0 auto; padding: 1.5rem 1rem 3rem; display: flex; flex-direction: column; gap: 12px; }
.bubble { max-width: 88%; padding: 13px 17px; font-size: 15px; line-height: 1.7; animation: fadeIn 0.35s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.bubble.ai { background: #fff; color: #1a1a1a; border-radius: 4px 18px 18px 18px; align-self: flex-start; box-shadow: 0 1px 4px rgba(0,0,0,0.09); max-width: 92%; }
.bubble.user { background: #1D9E75; color: #fff; border-radius: 18px 18px 4px 18px; align-self: flex-end; }
.choices { display: flex; flex-direction: column; gap: 9px; width: 92%; }
.choice-btn { background: #fff; border: 1px solid #e0ddd6; border-radius: 13px; padding: 12px 17px; font-size: 15px; color: #1a1a1a; cursor: pointer; text-align: left; line-height: 1.5; font-family: inherit; transition: border-color 0.15s, background 0.15s; }
.choice-btn:hover, .choice-btn:active { background: #f0faf6; border-color: #1D9E75; }
.result-card { background: #fff; border: 1px solid #e0ddd6; border-radius: 14px; padding: 1.25rem; margin-top: 0.5rem; }
.result-card h3 { font-size: 11px; font-weight: 600; color: #999; margin-bottom: 10px; letter-spacing: 0.08em; }
.result-item { font-size: 14px; color: #1a1a1a; line-height: 1.8; padding: 6px 0; border-bottom: 1px solid #f0ede8; }
.result-item:last-child { border-bottom: none; }
.result-label { font-size: 11px; color: #888; margin-bottom: 2px; }
.result-value { font-weight: 500; }
#restart-btn { margin-top: 1rem; background: transparent; border: 1px solid #d0cdc6; border-radius: 10px; padding: 10px 20px; font-size: 14px; color: #666; cursor: pointer; font-family: inherit; display: block; width: 100%; }
.dot-row { display: flex; gap: 5px; padding: 14px 18px; background: #fff; border-radius: 4px 18px 18px 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.09); width: fit-content; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #bbb; animation: bounce 1.1s infinite; }
.dot:nth-child(2) { animation-delay: 0.18s; }
.dot:nth-child(3) { animation-delay: 0.36s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
</style>
</head>
<body>
<div id="app"></div>

<script>
const app = document.getElementById('app');
const answers = {};

// 会話フロー定義
const flow = [
  {
    id: 'greeting',
    message: 'こんにちは！\n測定の前に、少しだけ教えていただけますか？\n最近、体の調子はいかがですか？',
    choices: [
      { label: '良い', next: 'good_condition' },
      { label: 'まあまあ', next: 'ask_symptom' },
      { label: 'あまり良くない', next: 'ask_symptom' },
    ],
    key: 'condition'
  },
  {
    id: 'good_condition',
    message: 'それは良かったです！\n体調が良くても、気になることってありますか？\n例えば、こういったことはないですか？',
    choices: [
      { label: '手足の冷えが気になる', next: 'ask_duration' },
      { label: '疲れが取れにくい', next: 'ask_duration' },
      { label: '肩こり・首こりがある', next: 'ask_duration' },
      { label: '特に気になることはない', next: 'ask_lifestyle' },
    ],
    key: 'symptom'
  },
  {
    id: 'ask_symptom',
    message: 'そうなんですね。\n具体的に気になっていることはありますか？',
    choices: [
      { label: '手足の冷えが気になる', next: 'ask_duration' },
      { label: '疲れが取れにくい', next: 'ask_duration' },
      { label: '肩こり・首こりがある', next: 'ask_duration' },
      { label: '頭が重い・頭痛がある', next: 'ask_duration' },
    ],
    key: 'symptom'
  },
  {
    id: 'ask_duration',
    message: 'それはいつ頃からですか？',
    choices: [
      { label: '最近になってから', next: 'ask_lifestyle' },
      { label: '半年以上前から', next: 'ask_lifestyle' },
      { label: 'ずっと前から、ずっとこんな感じ', next: 'ask_lifestyle' },
    ],
    key: 'duration'
  },
  {
    id: 'ask_lifestyle',
    message: '生活習慣で、心当たりはありますか？\n（複数当てはまる場合は、一番気になるものを選んでください）',
    choices: [
      { label: '睡眠が不規則・不足しがち', next: 'ask_effort' },
      { label: '運動する機会が少ない', next: 'ask_effort' },
      { label: '食事が不規則になりがち', next: 'ask_effort' },
      { label: 'ストレスが多い', next: 'ask_effort' },
    ],
    key: 'lifestyle'
  },
  {
    id: 'ask_effort',
    message: 'なるほど。\n今まで、自分で何か試してみたことはありますか？',
    choices: [
      { label: 'サプリメントを飲んでいる・飲んでいた', next: 'ask_result' },
      { label: '運動を始めようとしたことがある', next: 'ask_result' },
      { label: '食事を気をつけようとしたことがある', next: 'ask_result' },
      { label: '特に何もしていない', next: 'no_effort' },
    ],
    key: 'effort'
  },
  {
    id: 'ask_result',
    message: 'そうなんですね。\nそれで、実感としてはいかがでしたか？',
    choices: [
      { label: '効果はあったけど、続かなかった', next: 'bridge' },
      { label: 'あまり変わらなかった', next: 'bridge' },
      { label: 'やったりやめたりしてしまった', next: 'bridge' },
    ],
    key: 'result'
  },
  {
    id: 'no_effort',
    message: 'そうですか。\nなかなか何から始めればいいかわからないですよね。\nせっかくなので、今の体の状態を一緒に見てみましょうか。',
    choices: [
      { label: 'はい、見てみたいです', next: 'final' },
    ],
    key: 'no_effort_confirm'
  },
  {
    id: 'bridge',
    message: 'そうなんですね。\n頑張ってみても、なかなか変わらないと感じることってありますよね。\nせっかくなので、今の体の状態を一緒に見てみましょうか。',
    choices: [
      { label: 'はい、気になります', next: 'final' },
      { label: 'どんなことがわかるんですか？', next: 'explain_then_final' },
    ],
    key: 'bridge_confirm'
  },
  {
    id: 'explain_then_final',
    message: '指先の毛細血管の流れを見ることができます。\n血の流れの状態が、体のいろんな部分に影響していることがあります。\nぜひ、ご自身の目で確認してみてください。',
    choices: [
      { label: 'わかりました、見てみます', next: 'final' },
    ],
    key: 'explain_confirm'
  },
  {
    id: 'final',
    message: 'ありがとうございます。\nそれでは、担当者に声をかけてください。\nすぐにご案内します。',
    choices: [],
    key: null,
    isFinal: true
  }
];

const flowMap = {};
flow.forEach(f => flowMap[f.id] = f);

let currentStep = null;

function addBubble(text, type, delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const b = document.createElement('div');
      b.className = 'bubble ' + type;
      b.textContent = text;
      app.appendChild(b);
      app.scrollTop = app.scrollHeight;
      window.scrollTo(0, document.body.scrollHeight);
      resolve();
    }, delay);
  });
}

function showTyping(duration = 700) {
  return new Promise(resolve => {
    const d = document.createElement('div');
    d.className = 'dot-row'; d.id = 'typing';
    d.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    app.appendChild(d);
    app.scrollTop = app.scrollHeight;
    setTimeout(() => { d.remove(); resolve(); }, duration);
  });
}

function addChoices(step) {
  if (!step.choices || step.choices.length === 0) {
    // 最終ステップ：サマリー表示
    showSummary();
    return;
  }
  const div = document.createElement('div');
  div.className = 'choices';
  step.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.label;
    btn.onclick = async () => {
      div.remove();
      if (step.key) answers[step.key] = c.label;
      await addBubble(c.label, 'user');
      await goTo(c.next);
    };
    div.appendChild(btn);
  });
  app.appendChild(div);
  window.scrollTo(0, document.body.scrollHeight);
}

async function goTo(id) {
  const step = flowMap[id];
  if (!step) return;
  currentStep = step;
  await showTyping(600);
  await addBubble(step.message, 'ai');
  if (step.isFinal) {
    showSummary();
  } else {
    addChoices(step);
  }
}

function showSummary() {
  const labels = {
    condition: '体調',
    symptom: '気になる症状',
    duration: 'いつから',
    lifestyle: '生活習慣',
    effort: '自力での取り組み',
    result: '取り組みの結果',
  };
  const card = document.createElement('div');
  card.className = 'result-card';
  card.innerHTML = '<h3>販売員へのサマリー</h3>';
  Object.keys(labels).forEach(key => {
    if (answers[key]) {
      const item = document.createElement('div');
      item.className = 'result-item';
      item.innerHTML = `<div class="result-label">${labels[key]}</div><div class="result-value">${answers[key]}</div>`;
      card.appendChild(item);
    }
  });
  const btn = document.createElement('button');
  btn.id = 'restart-btn';
  btn.textContent = '最初からやり直す';
  btn.onclick = restart;
  card.appendChild(btn);
  app.appendChild(card);
  window.scrollTo(0, document.body.scrollHeight);
}

function restart() {
  Object.keys(answers).forEach(k => delete answers[k]);
  app.innerHTML = '';
  init();
}

async function init() {
  await showTyping(500);
  const first = flowMap['greeting'];
  await addBubble(first.message, 'ai');
  addChoices(first);
}

init();
</script>
</body>
</html>
