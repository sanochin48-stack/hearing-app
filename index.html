<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1D9E75">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PZ">
<title>PZ ヒアリング</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f5f4f0; min-height: 100vh; }
#header { position: fixed; top: 0; left: 0; right: 0; background: #fff; border-bottom: 1px solid #e8e5e0; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; z-index: 100; }
#header-title { font-size: 15px; font-weight: 600; color: #1D9E75; }
#update-btn { font-size: 12px; color: #888; background: #f0ede8; border: none; border-radius: 8px; padding: 5px 12px; cursor: pointer; font-family: inherit; }
#update-status { font-size: 11px; color: #1D9E75; display: none; }
#app { max-width: 480px; margin: 0 auto; padding: 4.5rem 1rem 3rem; display: flex; flex-direction: column; gap: 12px; }
.bubble { max-width: 88%; padding: 13px 17px; font-size: 15px; line-height: 1.7; animation: fadeIn 0.35s ease; white-space: pre-wrap; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.bubble.ai { background: #fff; color: #1a1a1a; border-radius: 4px 18px 18px 18px; align-self: flex-start; box-shadow: 0 1px 4px rgba(0,0,0,0.09); max-width: 92%; }
.bubble.user { background: #1D9E75; color: #fff; border-radius: 18px 18px 4px 18px; align-self: flex-end; }
.choices { display: flex; flex-direction: column; gap: 9px; width: 92%; }
.choice-btn { background: #fff; border: 1px solid #e0ddd6; border-radius: 13px; padding: 12px 17px; font-size: 15px; color: #1a1a1a; cursor: pointer; text-align: left; line-height: 1.5; font-family: inherit; transition: border-color 0.15s, background 0.15s; }
.choice-btn:hover, .choice-btn:active { background: #f0faf6; border-color: #1D9E75; }
.teaser-card { background: #fff; border-radius: 14px; padding: 1.2rem 1.4rem; width: 92%; box-shadow: 0 1px 4px rgba(0,0,0,0.09); animation: fadeIn 0.4s ease; }
.teaser-text { font-size: 16px; font-weight: 600; color: #1a1a1a; line-height: 1.6; margin-bottom: 14px; }
.teaser-btn { background: #1D9E75; color: #fff; border: none; border-radius: 11px; padding: 12px 20px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; width: 100%; }
.teaser-btn:active { opacity: 0.85; }
.product-card { background: #fff; border: 2px solid #1D9E75; border-radius: 16px; padding: 1.4rem; width: 92%; animation: fadeIn 0.4s ease; }
.product-badge { display: inline-block; background: #1D9E75; color: #fff; font-size: 11px; font-weight: 600; border-radius: 6px; padding: 3px 10px; margin-bottom: 10px; letter-spacing: 0.06em; }
.product-series { font-size: 13px; color: #888; margin-bottom: 2px; }
.product-name { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
.product-copy { font-size: 14px; color: #555; margin-bottom: 14px; line-height: 1.6; }
.product-points { background: #f5fdf9; border-radius: 10px; padding: 12px 14px; }
.product-points-label { font-size: 11px; color: #1D9E75; font-weight: 600; margin-bottom: 6px; }
.product-point { font-size: 14px; color: #1a1a1a; line-height: 1.7; padding: 2px 0; }
.product-point::before { content: '・'; color: #1D9E75; }
.product-sub { margin-top: 12px; background: #f9f9f7; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #666; line-height: 1.6; }
.product-sub-label { font-size: 11px; color: #aaa; font-weight: 600; margin-bottom: 4px; }
.measure-btn { background: #1D9E75; color: #fff; border: none; border-radius: 13px; padding: 15px 20px; font-size: 16px; font-weight: 600; cursor: pointer; width: 92%; font-family: inherit; margin-top: 4px; animation: fadeIn 0.4s ease; }
.measure-btn:active { opacity: 0.85; }
.summary-card { background: #fff; border: 1px solid #e0ddd6; border-radius: 14px; padding: 1.25rem; width: 92%; animation: fadeIn 0.4s ease; }
.summary-card h3 { font-size: 11px; font-weight: 600; color: #999; margin-bottom: 10px; letter-spacing: 0.08em; }
.summary-item { font-size: 14px; color: #1a1a1a; padding: 7px 0; border-bottom: 1px solid #f0ede8; }
.summary-item:last-child { border-bottom: none; }
.summary-label { font-size: 11px; color: #888; margin-bottom: 2px; }
.summary-value { font-weight: 500; }
#restart-btn { margin-top: 1rem; background: transparent; border: 1px solid #d0cdc6; border-radius: 10px; padding: 10px 20px; font-size: 14px; color: #666; cursor: pointer; font-family: inherit; display: block; width: 100%; }
.dot-row { display: flex; gap: 5px; padding: 14px 18px; background: #fff; border-radius: 4px 18px 18px 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.09); width: fit-content; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #bbb; animation: bounce 1.1s infinite; }
.dot:nth-child(2) { animation-delay: 0.18s; }
.dot:nth-child(3) { animation-delay: 0.36s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
</style>
</head>
<body>
<div id="header">
  <span id="header-title">PZ ヒアリング</span>
  <div style="display:flex;align-items:center;gap:8px;">
    <span id="update-status">更新しました</span>
    <button id="update-btn" onclick="updateContent()">更新</button>
  </div>
</div>
<div id="app"></div>
<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

let config = {
  products: {
    anklet:   { name: 'PZアンクレット', series: 'PZシリーズ', copy: '着けているだけで回復をサポート', points: ['着けるだけ、外すのも簡単', '足首から全身の血流をサポート', '24時間つけっぱなしでOK'] },
    bracelet: { name: 'PZブレスレット', series: 'PZシリーズ', copy: '着けているだけで回復をサポート', points: ['着けるだけ、外すのも簡単', '手首から上半身の血流をサポート', '24時間つけっぱなしでOK'] },
    ring:     { name: 'PZリング',       series: 'PZシリーズ', copy: '着けているだけで回復をサポート', points: ['着けるだけ、外すのも簡単', '指から全身の血流をサポート', '24時間つけっぱなしでOK'] },
  },
  flow: [

    // ===== ① 体の気になること =====
    {
      id: 'greeting',
      message: '最近、体で気になることはありますか？',
      key: 'has_symptom',
      choices: [
        { label: 'ある', next: 'ask_symptom' },
        { label: 'ない', next: 'ask_effort_health' },
      ]
    },

    // 症状を聞く
    {
      id: 'ask_symptom',
      message: 'どんなことが気になっていますか？',
      key: 'symptom',
      choices: [
        { label: '手足の冷えが気になる', next: 'ask_effort_symptom' },
        { label: '疲れやすい・疲れが取れない', next: 'ask_effort_symptom' },
        { label: '肩こり・首こりがある', next: 'ask_effort_symptom' },
        { label: '全身がだるい・重い', next: 'ask_effort_symptom' },
      ]
    },

    // 症状あり → その症状のために取り組んでいるか
    {
      id: 'ask_effort_symptom',
      message: 'そうなんですね。\nそのために、何か取り組んでいることはありますか？',
      key: 'doing',
      choices: [
        { label: 'はい、取り組んでいます', next: 'ask_what' },
        { label: 'いいえ、特にしていません', next: 'ask_want_to' },
      ]
    },

    // 症状なし → 健康のために取り組んでいるか
    {
      id: 'ask_effort_health',
      message: '健康のために、今そしてこれからのために\n何か取り組んでいることはありますか？',
      key: 'doing',
      choices: [
        { label: 'はい、取り組んでいます', next: 'ask_what' },
        { label: 'いいえ、特にしていません', next: 'ask_want_to' },
      ]
    },

    // ===== はいルート：何をしているか =====
    {
      id: 'ask_what',
      message: '素晴らしいですね！\n具体的には何をされていますか？',
      key: 'what',
      choices: [
        { label: '運動（ウォーキング・ジムなど）', next: 'ask_detail_exercise' },
        { label: '食事に気をつけている', next: 'ask_detail_food' },
        { label: 'サプリメントを飲んでいる', next: 'ask_detail_supple' },
        { label: 'その他', next: 'ask_detail_other' },
      ]
    },

    // 内容：運動
    { id: 'ask_detail_exercise', message: 'どんな運動をされていますか？', key: 'detail',
      choices: [{ label: 'ウォーキング・散歩', next: 'ask_freq' }, { label: 'ジム・筋トレ', next: 'ask_freq' }, { label: 'ヨガ・ストレッチ', next: 'ask_freq' }, { label: 'スポーツ', next: 'ask_freq' }] },

    // 内容：食事
    { id: 'ask_detail_food', message: '特に何を気をつけていますか？', key: 'detail',
      choices: [{ label: 'カロリー・糖質を控えている', next: 'ask_freq' }, { label: '野菜・栄養バランスを意識', next: 'ask_freq' }, { label: '断食・ファスティング', next: 'ask_freq' }, { label: '食べる時間・量を調整', next: 'ask_freq' }] },

    // 内容：サプリ
    { id: 'ask_detail_supple', message: 'どんなサプリを飲んでいますか？', key: 'detail',
      choices: [{ label: 'ビタミン・ミネラル系', next: 'ask_freq' }, { label: 'プロテイン', next: 'ask_freq' }, { label: '美容・コラーゲン系', next: 'ask_freq' }, { label: '健康維持・総合系', next: 'ask_freq' }] },

    // 内容：その他
    { id: 'ask_detail_other', message: 'どんなことをされていますか？', key: 'detail',
      choices: [{ label: '睡眠を意識している', next: 'ask_freq' }, { label: 'マッサージ・整体に通っている', next: 'ask_freq' }, { label: '温活・入浴を工夫している', next: 'ask_freq' }, { label: 'その他', next: 'ask_freq' }] },

    // 頻度
    { id: 'ask_freq', message: 'それはどのくらいの頻度でされていますか？', key: 'freq',
      choices: [{ label: '毎日できている', next: 'ask_period' }, { label: '週に数回', next: 'ask_period' }, { label: '気が向いたときに', next: 'ask_period' }] },

    // 期間
    { id: 'ask_period', message: 'どのくらい続けていますか？', key: 'period',
      choices: [{ label: '始めたばかり（1ヶ月以内）', next: 'ask_hard' }, { label: '数ヶ月', next: 'ask_hard' }, { label: '半年以上', next: 'ask_hard' }, { label: '1年以上', next: 'ask_hard' }] },

    // 大変か → テーザーへ
    { id: 'ask_hard', message: '続けていらっしゃるんですね。\n正直なところ、大変だなと感じることはありますか？', key: 'hard',
      choices: [{ label: '面倒なときもある', next: 'teaser' }, { label: 'なかなか続かない', next: 'teaser' }, { label: '習慣になっているので大丈夫', next: 'teaser' }] },

    // ===== いいえルート：したいけどできていない =====
    {
      id: 'ask_want_to',
      message: 'そうなんですね。\n何かしたいとは思っているけど、\nなかなかできていない感じですか？',
      key: 'want_to',
      choices: [
        { label: '何から始めればいいかわからない', next: 'teaser' },
        { label: '面倒だし、続く気がしない', next: 'teaser' },
        { label: 'そこまで考えていなかった', next: 'teaser' },
      ]
    },

    // ===== 提案テーザー・製品カードはJS関数で処理 =====
    { id: 'teaser', isTeaser: true },
  ]
};

// ===== 製品選択ロジック =====
function getRecommendedProduct() {
  const symptom = answers.symptom || '';
  if (symptom.includes('冷え')) return config.products.anklet;
  if (symptom.includes('疲れ') || symptom.includes('肩こり')) return config.products.bracelet;
  return config.products.ring;
}

function getSubProducts() {
  const symptom = answers.symptom || '';
  let main;
  if (symptom.includes('冷え')) main = 'anklet';
  else if (symptom.includes('疲れ') || symptom.includes('肩こり')) main = 'bracelet';
  else main = 'ring';
  return ['anklet', 'bracelet', 'ring'].filter(k => k !== main).map(k => config.products[k]);
}

// ===== 更新ボタン =====
async function updateContent() {
  const btn = document.getElementById('update-btn');
  const status = document.getElementById('update-status');
  btn.textContent = '取得中…'; btn.disabled = true;
  try {
    const res = await fetch('config.json?t=' + Date.now());
    if (!res.ok) throw new Error();
    config = await res.json();
    status.style.display = 'inline';
    setTimeout(() => status.style.display = 'none', 2000);
  } catch(e) {
    alert('更新できませんでした。\nWi-Fi接続を確認してください。');
  } finally {
    btn.textContent = '更新'; btn.disabled = false;
  }
}

// ===== ユーティリティ =====
const app = document.getElementById('app');
const answers = {};
const getFlowMap = () => { const m={}; config.flow.forEach(f=>m[f.id]=f); return m; };

function addBubble(text, type) {
  return new Promise(r => setTimeout(() => {
    const b = document.createElement('div');
    b.className = 'bubble ' + type;
    b.textContent = text;
    app.appendChild(b); scroll(); r();
  }, 0));
}

function showTyping(ms=700) {
  return new Promise(r => {
    const d = document.createElement('div');
    d.className = 'dot-row'; d.id = 'typing';
    d.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    app.appendChild(d); scroll();
    setTimeout(() => { d.remove(); r(); }, ms);
  });
}

function scroll() { window.scrollTo(0, document.body.scrollHeight); }

// ===== テーザー =====
async function showTeaser() {
  await showTyping(800);
  const card = document.createElement('div');
  card.className = 'teaser-card';
  card.innerHTML = `
    <div class="teaser-text">着けているだけで\n回復をサポートできるものがあります。</div>
    <button class="teaser-btn" id="teaser-btn">詳しく見る</button>
  `;
  app.appendChild(card); scroll();
  document.getElementById('teaser-btn').onclick = async () => {
    document.getElementById('teaser-btn').disabled = true;
    await addBubble('詳しく見る', 'user');
    await showProductCard();
  };
}

// ===== 製品カード =====
async function showProductCard() {
  await showTyping(700);
  const main = getRecommendedProduct();
  const subs = getSubProducts();
  const card = document.createElement('div');
  card.className = 'product-card';
  const pointsHtml = main.points.map(p => `<div class="product-point">${p}</div>`).join('');
  const subsHtml = subs.map(s => `<span style="font-weight:600;">${s.name}</span>`).join('・');
  card.innerHTML = `
    <div class="product-badge">あなたへのご提案</div>
    <div class="product-series">${main.series}</div>
    <div class="product-name">${main.name}</div>
    <div class="product-copy">${main.copy}</div>
    <div class="product-points">
      <div class="product-points-label">ポイント</div>
      ${pointsHtml}
    </div>
    <div class="product-sub">
      <div class="product-sub-label">その他のラインナップ</div>
      ${subsHtml}
    </div>
  `;
  app.appendChild(card); scroll();
  await showTyping(600);
  await addBubble('実際に体温の変化を\n一緒に見てみましょう！', 'ai');
  setTimeout(() => {
    const btn = document.createElement('button');
    btn.className = 'measure-btn';
    btn.textContent = '体温の変化を見てみます';
    btn.onclick = () => { btn.remove(); showHandover(); };
    app.appendChild(btn); scroll();
  }, 400);
}

// ===== 販売員サマリー =====
async function showHandover() {
  await addBubble('体温の変化を見てみます', 'user');
  await showTyping(600);
  await addBubble('ありがとうございます！\nでは担当者をお呼びします。\nそのままお待ちください。', 'ai');
  setTimeout(() => {
    const labels = {
      has_symptom: '体の気になること',
      symptom:     '気になる症状',
      doing:       '取り組み状況',
      what:        '取り組みの種類',
      detail:      '取り組みの内容',
      freq:        '頻度',
      period:      '継続期間',
      hard:        '負担・継続の課題',
      want_to:     '取り組まない理由',
    };
    const card = document.createElement('div');
    card.className = 'summary-card';
    card.innerHTML = '<h3>販売員へのサマリー</h3>';
    Object.keys(labels).forEach(key => {
      if (answers[key]) {
        const item = document.createElement('div');
        item.className = 'summary-item';
        item.innerHTML = `<div class="summary-label">${labels[key]}</div><div class="summary-value">${answers[key]}</div>`;
        card.appendChild(item);
      }
    });
    const main = getRecommendedProduct();
    const recItem = document.createElement('div');
    recItem.className = 'summary-item';
    recItem.innerHTML = `<div class="summary-label">提案製品</div><div class="summary-value">${main.name}</div>`;
    card.appendChild(recItem);

    const sc = document.createElement('div');
    sc.style.cssText = 'margin-top:12px;background:#fff8f0;border-radius:10px;padding:12px 14px;font-size:14px;line-height:1.7;color:#1a1a1a;';
    sc.innerHTML = `<div style="font-size:11px;color:#e07020;font-weight:600;margin-bottom:4px;">最初のひと言</div>${buildOpeningLine()}`;
    card.appendChild(sc);

    const btn = document.createElement('button');
    btn.id = 'restart-btn';
    btn.textContent = '最初からやり直す';
    btn.onclick = restart;
    card.appendChild(btn);
    app.appendChild(card); scroll();
  }, 400);
}

function buildOpeningLine() {
  const main = getRecommendedProduct();
  if (answers.symptom && answers.what) {
    const hard = answers.hard ? `、${answers.hard}とのことでした` : '';
    return `「${answers.symptom}があって、${answers.what}に取り組んでいらっしゃる方です${hard}。${main.name}をご提案しました。体温の変化を一緒に確認してみましょう」`;
  }
  if (answers.symptom) {
    return `「${answers.symptom}が気になっている方です。${main.name}をご提案しました。体温の変化を一緒に確認してみましょう」`;
  }
  if (answers.what) {
    const hard = answers.hard ? `、${answers.hard}とのことでした` : '';
    return `「${answers.what}に取り組んでいらっしゃる方です${hard}。${main.name}をご提案しました。体温の変化を一緒に確認してみましょう」`;
  }
  return `「${main.name}をご提案しました。体温の変化を一緒に確認してみましょう」`;
}

// ===== 会話エンジン =====
function addChoices(step) {
  const div = document.createElement('div');
  div.className = 'choices';
  step.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.label;
    btn.onclick = async () => {
      div.remove();
      if (step.key) answers[step.key] = c.label;
      await addBubble(c.label, 'user');
      await goTo(c.next);
    };
    div.appendChild(btn);
  });
  app.appendChild(div); scroll();
}

async function goTo(id) {
  const step = getFlowMap()[id];
  if (!step) return;
  if (step.isTeaser) { await showTeaser(); return; }
  await showTyping(650);
  await addBubble(step.message, 'ai');
  addChoices(step);
}

function restart() {
  Object.keys(answers).forEach(k => delete answers[k]);
  app.innerHTML = '';
  init();
}

async function init() {
  const first = getFlowMap()['greeting'];
  await showTyping(500);
  await addBubble(first.message, 'ai');
  addChoices(first);
}

init();
</script>
</body>
</html>
