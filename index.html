<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1D9E75">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="247">
<title>247 ヒアリング</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f5f4f0; min-height: 100vh; }
#header { position: fixed; top: 0; left: 0; right: 0; background: #fff; border-bottom: 1px solid #e8e5e0; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; z-index: 100; }
#header-title { font-size: 15px; font-weight: 600; color: #1D9E75; }
#update-btn { font-size: 12px; color: #888; background: #f0ede8; border: none; border-radius: 8px; padding: 5px 12px; cursor: pointer; font-family: inherit; }
#update-status { font-size: 11px; color: #1D9E75; display: none; }
#app { max-width: 480px; margin: 0 auto; padding: 4.5rem 1rem 3rem; display: flex; flex-direction: column; gap: 12px; }
.bubble { max-width: 88%; padding: 13px 17px; font-size: 15px; line-height: 1.7; animation: fadeIn 0.35s ease; white-space: pre-wrap; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.bubble.ai { background: #fff; color: #1a1a1a; border-radius: 4px 18px 18px 18px; align-self: flex-start; box-shadow: 0 1px 4px rgba(0,0,0,0.09); max-width: 92%; }
.bubble.user { background: #1D9E75; color: #fff; border-radius: 18px 18px 4px 18px; align-self: flex-end; }
.choices { display: flex; flex-direction: column; gap: 9px; width: 92%; }
.choice-btn { background: #fff; border: 1px solid #e0ddd6; border-radius: 13px; padding: 12px 17px; font-size: 15px; color: #1a1a1a; cursor: pointer; text-align: left; line-height: 1.5; font-family: inherit; transition: border-color 0.15s, background 0.15s; }
.choice-btn:hover, .choice-btn:active { background: #f0faf6; border-color: #1D9E75; }
.proposal-card { background: #fff; border: 2px solid #1D9E75; border-radius: 16px; padding: 1.4rem; width: 92%; animation: fadeIn 0.4s ease; }
.proposal-label { font-size: 11px; font-weight: 600; color: #1D9E75; letter-spacing: 0.1em; margin-bottom: 8px; }
.proposal-name { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
.proposal-copy { font-size: 14px; color: #555; margin-bottom: 14px; line-height: 1.6; }
.proposal-reason { background: #f5fdf9; border-radius: 10px; padding: 12px 14px; font-size: 14px; color: #1a1a1a; line-height: 1.7; }
.proposal-reason-label { font-size: 11px; color: #1D9E75; font-weight: 600; margin-bottom: 4px; }
.measure-btn { background: #1D9E75; color: #fff; border: none; border-radius: 13px; padding: 15px 20px; font-size: 16px; font-weight: 600; cursor: pointer; width: 92%; font-family: inherit; margin-top: 4px; animation: fadeIn 0.4s ease; }
.measure-btn:active { opacity: 0.85; }
.summary-card { background: #fff; border: 1px solid #e0ddd6; border-radius: 14px; padding: 1.25rem; width: 92%; animation: fadeIn 0.4s ease; }
.summary-card h3 { font-size: 11px; font-weight: 600; color: #999; margin-bottom: 10px; letter-spacing: 0.08em; }
.summary-item { font-size: 14px; color: #1a1a1a; padding: 7px 0; border-bottom: 1px solid #f0ede8; }
.summary-item:last-child { border-bottom: none; }
.summary-label { font-size: 11px; color: #888; margin-bottom: 2px; }
.summary-value { font-weight: 500; }
#restart-btn { margin-top: 1rem; background: transparent; border: 1px solid #d0cdc6; border-radius: 10px; padding: 10px 20px; font-size: 14px; color: #666; cursor: pointer; font-family: inherit; display: block; width: 100%; }
.dot-row { display: flex; gap: 5px; padding: 14px 18px; background: #fff; border-radius: 4px 18px 18px 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.09); width: fit-content; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #bbb; animation: bounce 1.1s infinite; }
.dot:nth-child(2) { animation-delay: 0.18s; }
.dot:nth-child(3) { animation-delay: 0.36s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
.step-label { font-size: 11px; color: #aaa; letter-spacing: 0.06em; align-self: flex-start; margin-top: 4px; }
</style>
</head>
<body>
<div id="header">
  <span id="header-title">247 ヒアリング</span>
  <div style="display:flex;align-items:center;gap:8px;">
    <span id="update-status">更新しました</span>
    <button id="update-btn" onclick="updateContent()">更新</button>
  </div>
</div>
<div id="app"></div>
<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

let config = {
  product: { name: '247', copy: 'つけているだけで血流をサポート' },
  flow: [

    // ① 健康への関心確認
    {
      id: 'greeting',
      message: 'こんにちは！\n少しだけ聞かせてもらえますか？\n\n健康について、日頃から気にしている方ですか？',
      key: 'interest',
      choices: [
        { label: 'はい、気にしています', next: 'ask_effort' },
        { label: 'あまり気にしていない', next: 'reframe' },
      ]
    },

    // ① 関心なし → 切り口を変える
    {
      id: 'reframe',
      message: 'そうなんですね。\n\n最近、疲れやすいとか、体が重いと感じることはありますか？',
      key: 'reframe_answer',
      choices: [
        { label: 'そう言われると、ある', next: 'ask_effort' },
        { label: 'あまりない', next: 'reframe2' },
      ]
    },

    // ① 関心なし → さらに切り口を変える
    {
      id: 'reframe2',
      message: 'それは良かったです！\n\nただ、年齢とともに体の変化って少しずつ出てくるもので。\n\n例えば、冷えとか、睡眠の質が落ちたとか、気になることは何かありますか？',
      key: 'reframe2_answer',
      choices: [
        { label: '言われてみれば、冷えが気になる', next: 'ask_effort' },
        { label: '睡眠がちょっと浅いかも', next: 'ask_effort' },
        { label: '特にない', next: 'ask_effort' },
      ]
    },

    // ② 取り組みの確認
    {
      id: 'ask_effort',
      message: '健康のために、何か取り組んでいることはありますか？',
      key: 'effort',
      choices: [
        { label: 'はい、やっています', next: 'ask_effort_hard' },
        { label: 'いいえ、特にしていない', next: 'ask_why_not' },
      ]
    },

    // ② 取り組んでいる → 面倒かどうか確認
    {
      id: 'ask_effort_hard',
      message: 'えらいですね！\n\nそれって、毎日続けるのは大変じゃないですか？',
      key: 'effort_hard',
      choices: [
        { label: '正直、面倒なこともある', next: 'proposal' },
        { label: '習慣になっているので大丈夫', next: 'proposal_easy' },
      ]
    },

    // ② していない → なぜか確認
    {
      id: 'ask_why_not',
      message: 'そうなんですね。\n\n何かしたいとは思っているけど、面倒だったりしますか？',
      key: 'why_not',
      choices: [
        { label: 'そう、なかなか続かなくて', next: 'proposal' },
        { label: 'そもそも何をすればいいかわからない', next: 'proposal' },
        { label: '特に何もしなくていいと思っている', next: 'proposal_light' },
      ]
    },

    // ③ 提案（面倒・続かない系）
    {
      id: 'proposal',
      isProposal: true,
      proposalType: 'main'
    },

    // ③ 提案（習慣化できている人向け・プラスアルファ訴求）
    {
      id: 'proposal_easy',
      isProposal: true,
      proposalType: 'plus'
    },

    // ③ 提案（関心薄い人向け・ライト訴求）
    {
      id: 'proposal_light',
      isProposal: true,
      proposalType: 'light'
    },
  ]
};

// ===== 更新ボタン =====
async function updateContent() {
  const btn = document.getElementById('update-btn');
  const status = document.getElementById('update-status');
  btn.textContent = '取得中…'; btn.disabled = true;
  try {
    const res = await fetch('config.json?t=' + Date.now());
    if (!res.ok) throw new Error();
    config = await res.json();
    status.style.display = 'inline';
    setTimeout(() => status.style.display = 'none', 2000);
  } catch(e) {
    alert('更新できませんでした。\nWi-Fi接続を確認してください。');
  } finally {
    btn.textContent = '更新'; btn.disabled = false;
  }
}

// ===== ユーティリティ =====
const app = document.getElementById('app');
const answers = {};
const getFlowMap = () => { const m={}; config.flow.forEach(f=>m[f.id]=f); return m; };

function addBubble(text, type) {
  return new Promise(r => setTimeout(() => {
    const b = document.createElement('div');
    b.className = 'bubble ' + type;
    b.textContent = text;
    app.appendChild(b); scroll(); r();
  }, 0));
}

function showTyping(ms=700) {
  return new Promise(r => {
    const d = document.createElement('div');
    d.className = 'dot-row'; d.id = 'typing';
    d.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    app.appendChild(d); scroll();
    setTimeout(() => { d.remove(); r(); }, ms);
  });
}

function scroll() { window.scrollTo(0, document.body.scrollHeight); }

// ===== 提案メッセージ =====
function getProposalMessage(type) {
  if (type === 'plus') {
    return 'すごいですね、ちゃんと続けられているんですね。\n\nそれに加えて、着けているだけでサポートできるものがあったら、もっと楽になりませんか？\n\n着脱もとっても簡単なので、今の習慣のじゃまをしません。';
  }
  if (type === 'light') {
    return '確かに、無理してやる必要はないですよね。\n\nただ、着けているだけでいいし、着脱もとっても簡単なものがあるとしたら、試してみる価値はあると思いませんか？';
  }
  return '続けるのって、やっぱり大変ですよね。\n\nだったら、着けているだけでいいものがあったらどうですか？\n\n着脱もとっても簡単なので、努力も面倒もいりません。';
}

function buildOpeningLine() {
  const effort = answers.effort === 'はい、やっています' ? '何か取り組んでいる' : '特に取り組んでいない';
  const hard = answers.effort_hard || answers.why_not || '';
  return `「${effort}方で、${hard ? hard + 'とのことでした。' : ''}着けるだけで続けられるものをご提案しています。測定で実際の変化を確認してみましょう」`;
}

// ===== 提案表示 =====
async function showProposal(type='main') {
  const p = config.product || { name: '247', copy: 'つけているだけで血流をサポート' };

  await showTyping(800);
  await addBubble(getProposalMessage(type), 'ai');
  await showTyping(600);

  const card = document.createElement('div');
  card.className = 'proposal-card';
  card.innerHTML = `
    <div class="proposal-label">ご提案</div>
    <div class="proposal-name">${p.name}</div>
    <div class="proposal-copy">${p.copy}</div>
    <div class="proposal-reason">
      <div class="proposal-reason-label">ポイント</div>
      着けるだけ。外すのも簡単。努力も面倒もいりません。
    </div>
  `;
  app.appendChild(card); scroll();

  await showTyping(700);
  await addBubble('試してみませんか？', 'ai');

  setTimeout(() => {
    const div = document.createElement('div');
    div.className = 'choices';
    [{label:'はい、試してみます', go: true},{label:'もう少し聞かせてください', go: false}].forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = c.label;
      btn.onclick = async () => {
        div.remove();
        await addBubble(c.label, 'user');
        if (c.go) {
          await showMeasure();
        } else {
          await showTyping(600);
          await addBubble('着けているだけで体の血流をサポートします。\n効果の確認のために測定できる機器もあります。\n実際に試してみるのが一番わかりやすいですよ。', 'ai');
          await showTyping(500);
          await showMeasure();
        }
      };
      div.appendChild(btn);
    });
    app.appendChild(div); scroll();
  }, 400);
}

// ===== ④ 測定誘導 =====
async function showMeasure() {
  await showTyping(600);
  await addBubble('実際に変化があるかどうか、確認できる機器があります。\n一緒に見てみましょう！', 'ai');

  setTimeout(() => {
    const btn = document.createElement('button');
    btn.className = 'measure-btn';
    btn.textContent = '測定してみる';
    btn.onclick = () => { btn.remove(); showHandover(); };
    app.appendChild(btn); scroll();
  }, 400);
}

// ===== 販売員サマリー =====
async function showHandover() {
  await addBubble('測定してみます', 'user');
  await showTyping(600);
  await addBubble('ありがとうございます！\nでは担当者をお呼びします。\nそのままお待ちください。', 'ai');

  setTimeout(() => {
    const labels = {
      interest: '健康への関心',
      reframe_answer: '疲れ・体の重さ',
      reframe2_answer: '気になること',
      effort: '取り組み状況',
      effort_hard: '継続の負担感',
      why_not: '取り組まない理由',
    };
    const card = document.createElement('div');
    card.className = 'summary-card';
    card.innerHTML = '<h3>販売員へのサマリー</h3>';
    Object.keys(labels).forEach(key => {
      if (answers[key]) {
        const item = document.createElement('div');
        item.className = 'summary-item';
        item.innerHTML = `<div class="summary-label">${labels[key]}</div><div class="summary-value">${answers[key]}</div>`;
        card.appendChild(item);
      }
    });
    const sc = document.createElement('div');
    sc.style.cssText = 'margin-top:12px;background:#fff8f0;border-radius:10px;padding:12px 14px;font-size:14px;line-height:1.7;color:#1a1a1a;';
    sc.innerHTML = `<div style="font-size:11px;color:#e07020;font-weight:600;margin-bottom:4px;">最初のひと言</div>${buildOpeningLine()}`;
    card.appendChild(sc);
    const btn = document.createElement('button');
    btn.id = 'restart-btn';
    btn.textContent = '最初からやり直す';
    btn.onclick = restart;
    card.appendChild(btn);
    app.appendChild(card); scroll();
  }, 400);
}

// ===== 会話エンジン =====
function addChoices(step) {
  const div = document.createElement('div');
  div.className = 'choices';
  step.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.label;
    btn.onclick = async () => {
      div.remove();
      if (step.key) answers[step.key] = c.label;
      await addBubble(c.label, 'user');
      await goTo(c.next);
    };
    div.appendChild(btn);
  });
  app.appendChild(div); scroll();
}

async function goTo(id) {
  const step = getFlowMap()[id];
  if (!step) return;
  if (step.isProposal) { await showProposal(step.proposalType || 'main'); return; }
  await showTyping(650);
  await addBubble(step.message, 'ai');
  addChoices(step);
}

function restart() {
  Object.keys(answers).forEach(k => delete answers[k]);
  app.innerHTML = '';
  init();
}

async function init() {
  const first = getFlowMap()['greeting'];
  await showTyping(500);
  await addBubble(first.message, 'ai');
  addChoices(first);
}

init();
</script>
</body>
</html>
